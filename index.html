<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Signal Restore provides independent local support for business phone systems, VoIP, UCaaS, POTS migrations, call routing, number porting, and provider coordination." />
  <title>Signal Restore | Local Expert Support for Business Phone Systems</title>
  <link rel="icon" href="assets/signal-restore-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #101522;
      --muted: #5f6675;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --line: #e4e0d8;
      --cyan: #25bcc0;
      --magenta: #b95d8b;
      --blue: #234c91;
      --amber: #f98f21;
      --green: #1d806b;
      --shadow: 0 24px 70px rgba(16, 21, 34, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #ffffff;
      color: var(--ink);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 18px clamp(20px, 4vw, 56px);
      background: rgba(251, 250, 247, 0.96);
      border-bottom: 1px solid rgba(228, 224, 216, 0.8);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .brand img {
      width: 44px;
      height: 44px;
    }

    .wordmark span {
      color: var(--amber);
    }

    nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    nav a,
    .header-call {
      padding: 10px 18px;
      border: 1px solid rgba(35, 76, 145, 0.12);
      border-radius: 999px;
      background: white;
      color: var(--blue);
      font-weight: 700;
    }

    section {
      padding: 80px clamp(20px, 5vw, 76px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 50px;
      align-items: center;
      background:
        radial-gradient(circle at 80% 20%, rgba(37,188,192,0.08), transparent 30%),
        linear-gradient(135deg, #ffffff 0%, #f8fbfc 100%);
    }

    .eyebrow {
      color: var(--amber);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 14px;
      white-space: nowrap;
    }

    h1 {
      font-size: clamp(3rem, 5vw, 5.5rem);
      line-height: 1.02;
      margin-bottom: 20px;
      white-space: nowrap;
    }

    h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .text-cyan { color: var(--cyan); }
    .text-magenta { color: var(--magenta); }
    .text-amber { color: var(--amber); }

    .hero-lede span {
      display: block;
      margin-bottom: 10px;
      white-space: nowrap;
      color: #3f4b5f;
      font-size: 1.05rem;
    }

    .hero-actions,
    .contact-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      font-weight: 800;
    }

    .button.primary {
      background: var(--amber);
      color: white;
    }

    .button.secondary {
      border: 1px solid rgba(35,76,145,0.15);
      color: var(--blue);
      background: white;
    }

    .support-note {
      margin-top: 16px;
      color: var(--muted);
      white-space: nowrap;
    }

    .hero-image img,
    .intro-support img {
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .proof-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
      padding: 28px clamp(20px, 5vw, 76px);
      background: #f8fafc;
      font-weight: 700;
    }

    .section-heading {
      margin-bottom: 28px;
    }

    .intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .intro-support p {
      margin-top: 20px;
      color: #465368;
      line-height: 1.8;
    }

    .service-list,
    .industry-list,
    .outcome-panel ul {
      list-style: none;
    }

    .service-list li,
    .industry-list > li,
    .outcome-panel li {
      padding: 18px 0;
      border-bottom: 1px solid #edf1f5;
    }

    .service-list strong {
      display: block;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .service-list span {
      color: #465368;
    }

    .industries-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .routing-card {
      background: #f8fafc;
      border: 1px solid #e6edf5;
      border-radius: 18px;
      padding: 24px;
      margin-top: 18px;
    }

    .routing-list {
      list-style: none;
      margin-top: 16px;
    }

    .routing-list li {
      margin-bottom: 18px;
    }

    .routing-list span {
      display: block;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .routing-list small {
      color: #465368;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .outcome-panel {
      background: #f8fafc;
      border: 1px solid #e6edf5;
      border-radius: 20px;
      padding: 30px;
    }

    .outcome-panel h3 {
      margin-bottom: 18px;
      color: var(--blue);
    }

    .outcome-panel p {
      margin-top: 18px;
      color: #465368;
      line-height: 1.8;
    }

    .approach-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .approach-list div {
      background: white;
      border: 1px solid #edf1f5;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(16,21,34,0.03);
    }

    .approach-list strong {
      display: block;
      margin-bottom: 10px;
      color: var(--blue);
    }

    .contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      background: #f8fafc;
    }

    .contact p {
      color: #465368;
      line-height: 1.8;
    }

    .contact a {
      color: var(--blue);
      font-weight: 600;
    }

    .form-frame iframe {
      width: 100%;
      height: 600px;
      border: 0;
      border-radius: 20px;
      background: white;
      box-shadow: var(--shadow);
    }

    .site-footer {
      padding: 40px clamp(20px, 5vw, 76px);
      display: flex;
      justify-content: space-between;
      gap: 24px;
      border-top: 1px solid #edf1f5;
      background: white;
    }

    .site-footer a {
      display: block;
      color: var(--blue);
      margin-bottom: 8px;
    }

    @media (max-width: 1100px) {
      .hero,
      .intro,
      .industries-layout,
      .contact,
      .approach-list,
      .proof-band {
        grid-template-columns: 1fr;
      }

      h1,
      .eyebrow,
      .hero-lede span,
      .support-note {
        white-space: normal;
      }

      .site-header,
      .site-footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- Full HTML content already structured and ready -->
  <!-- Keep existing HTML body structure from prior version below this line -->
</body>
</html>
